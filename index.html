<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>J.A.R.V.I.S · Móvil</title>
<meta name="theme-color" content="#02060d" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<style>
  :root{
    --bg:#02060d; --panel:#07111d; --card:#0a1726; --border:#163152; --border-hi:#265281;
    --cyan:#00d4ff; --cyan-soft:rgba(0,212,255,.15); --cyan-glow:rgba(0,212,255,.35);
    --green:#00ff88; --amber:#ffaa00; --red:#ff4444; --text:#e0f7ff; --text-dim:#7ab8cc; --text-muted:#3a6080;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:radial-gradient(circle at 50% 30%, #061523 0%, #02060d 70%, #01040b 100%);
    color:var(--text); font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    display:flex; flex-direction:column; height:100dvh; overflow:hidden; user-select:none;
  }
  /* ── Cabecera ── */
  header{
    display:flex; align-items:center; justify-content:space-between; padding:10px 14px;
    padding-top:calc(10px + env(safe-area-inset-top)); border-bottom:1px solid var(--border);
  }
  .brand{font-weight:700; letter-spacing:3px; color:var(--cyan); font-size:15px; text-shadow:0 0 14px var(--cyan-glow);}
  .hdr-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--cyan);font-size:17px;}
  /* ── Reactor (estilo Modo Super) ── */
  .core{position:relative; height:170px; display:flex; align-items:center; justify-content:center; flex:0 0 auto; margin-top:6px;}
  .reactor{width:160px; height:160px; overflow:visible; filter:drop-shadow(0 0 20px rgba(0,212,255,.6));}
  .reactor .rk{fill:none; stroke:#2fe3ff; stroke-linecap:round; transform-box:fill-box; transform-origin:center;}
  .r1{stroke-width:.8; stroke-dasharray:34 16; opacity:.55; animation:spin 64s linear infinite;}
  .r2{stroke-width:4; stroke-dasharray:1.4 5; opacity:.7; animation:spin 42s linear infinite reverse;}
  .r3{stroke-width:1.3; stroke-dasharray:24 12; opacity:.78; animation:spin 52s linear infinite;}
  .r4{stroke-width:2.2; stroke-dasharray:1 7; opacity:.66; animation:spin 30s linear infinite reverse;}
  .r5{stroke-width:1.6; stroke-dasharray:70 8 10 8; opacity:1; animation:spin 24s linear infinite;}
  .r6{stroke-width:2; stroke-dasharray:96 5; opacity:1; animation:spin 18s linear infinite reverse;}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .core-label{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); font-weight:700; letter-spacing:3px; font-size:14px; color:#eafaff; text-shadow:0 0 16px rgba(0,212,255,.9);}
  .status{position:absolute; bottom:-2px; left:0; right:0; text-align:center; font-size:11px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase;}
  /* estados */
  body.sp-listening .reactor{filter:drop-shadow(0 0 22px rgba(0,255,136,.7));}
  body.sp-listening .reactor .rk{stroke:var(--green);}
  body.sp-speaking .core{animation:pulse .5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  /* ── Chat ── */
  .log{flex:1 1 auto; overflow-y:auto; padding:12px 12px 4px; display:flex; flex-direction:column; gap:8px;}
  .msg{max-width:86%; padding:9px 13px; border-radius:14px; font-size:15px; line-height:1.45; white-space:pre-wrap; word-break:break-word;}
  .me{align-self:flex-end; background:var(--cyan-soft); border:1px solid var(--border-hi); color:var(--text);}
  .jv{align-self:flex-start; background:var(--card); border:1px solid var(--border); color:var(--text);}
  .sys{align-self:center; color:var(--text-muted); font-size:12px; text-align:center;}
  /* ── Barra de entrada ── */
  .bar{display:flex; gap:8px; padding:10px 12px; padding-bottom:calc(10px + env(safe-area-inset-bottom)); border-top:1px solid var(--border); background:rgba(7,17,29,.6);}
  .bar input{flex:1; min-width:0; padding:12px 14px; font-size:16px; border-radius:12px; background:var(--bg); border:1px solid var(--border); color:var(--text); outline:none;}
  .bar input:focus{border-color:var(--cyan);}
  .ico-btn{width:48px; height:48px; border-radius:12px; border:1px solid var(--border); background:var(--cyan-soft); color:var(--cyan); font-size:19px; flex:0 0 auto;}
  .ico-btn:active{background:var(--cyan-glow);}
  .ico-btn.mic.on{background:var(--green); color:#022; border-color:var(--green); box-shadow:0 0 14px rgba(0,255,136,.5);}
  /* ── Modal ajustes ── */
  .modal{position:fixed; inset:0; background:rgba(2,6,13,.92); display:none; align-items:center; justify-content:center; padding:18px; z-index:50;}
  .modal.show{display:flex;}
  .sheet{width:100%; max-width:420px; background:var(--panel); border:1px solid var(--border-hi); border-radius:16px; padding:18px;}
  .sheet h2{margin:0 0 6px; font-size:16px; color:var(--cyan); letter-spacing:1px;}
  .sheet p{margin:0 0 12px; font-size:13px; color:var(--text-dim);}
  .sheet label{display:block; font-size:12px; color:var(--text-dim); margin:10px 0 4px; letter-spacing:1px;}
  .sheet input{width:100%; padding:11px 12px; font-size:15px; border-radius:10px; background:var(--bg); border:1px solid var(--border); color:var(--text); outline:none;}
  .sheet .row{display:flex; gap:8px; margin-top:16px;}
  .btn{flex:1; padding:12px; border-radius:10px; border:1px solid var(--border); background:var(--cyan-soft); color:var(--cyan); font-size:15px; font-weight:600;}
  .btn.primary{background:var(--cyan); color:#022; border-color:var(--cyan);}
  .hint{font-size:11px; color:var(--text-muted); margin-top:10px; line-height:1.4;}
</style>
</head>
<body>
  <header>
    <span class="brand">J.A.R.V.I.S</span>
    <button class="hdr-btn" id="gear" aria-label="Ajustes">⚙</button>
  </header>

  <div class="core">
    <svg class="reactor" viewBox="0 0 200 200" aria-hidden="true">
      <circle class="rk r1" cx="100" cy="100" r="95"/><circle class="rk r2" cx="100" cy="100" r="85"/>
      <circle class="rk r3" cx="100" cy="100" r="73"/><circle class="rk r4" cx="100" cy="100" r="61"/>
      <circle class="rk r5" cx="100" cy="100" r="48"/><circle class="rk r6" cx="100" cy="100" r="35"/>
    </svg>
    <span class="core-label">JARVIS</span>
    <span class="status" id="status">EN LÍNEA</span>
  </div>

  <div class="log" id="log"></div>

  <div class="bar">
    <button class="ico-btn mic" id="mic" aria-label="Hablar">🎙</button>
    <input id="text" type="text" placeholder="Escribe o pulsa el micro…" autocomplete="off" />
    <button class="ico-btn" id="send" aria-label="Enviar">➤</button>
  </div>

  <!-- Ajustes: la KEY de MiniMax (se guarda solo en este móvil) -->
  <div class="modal" id="modal">
    <div class="sheet">
      <h2>Configuración</h2>
      <p>Pega tu <b>API key de MiniMax</b>. Se guarda SOLO en este móvil (no se sube a ningún sitio).</p>
      <label>API KEY de MiniMax</label>
      <input id="cfg-key" type="password" placeholder="sk-..." />
      <label>URL base (avanzado)</label>
      <input id="cfg-base" type="text" placeholder="https://api.minimax.io/anthropic" />
      <label>Modelo</label>
      <input id="cfg-model" type="text" placeholder="MiniMax-M2" />
      <div class="row">
        <button class="btn" id="cfg-cancel">Cancelar</button>
        <button class="btn primary" id="cfg-save">Guardar</button>
      </div>
      <div class="hint">Funciona con el PC apagado: tu móvil habla directamente con MiniMax (que está en la nube). Solo chat + voz; el control del PC necesita el JARVIS de escritorio.</div>
    </div>
  </div>

  <script src="movil.js"></script>
</body>
</html>
